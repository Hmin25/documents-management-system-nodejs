version: '3.8'

services:
  db:
    image: mysql:8
    container_name: dms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dms
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./uploads:/app/uploads

  app:
    build: .
    container_name: dms-app
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: dms
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads

volumes:
  db_data: